name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow

      - name: Build exe
        run: |
          pyinstaller --onefile --noconsole --name mindmap_generator mindmap_generator.py

      - name: Prepare package
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path package | Out-Null
          Copy-Item dist\mindmap_generator.exe package\
          Copy-Item example_mindmap.json package\
          @"
          盲陆驴莽聰篓猫炉麓忙聵聨茂录職
          1. 莽聰篓猫庐掳盲潞聥忙聹卢忙聣聯氓录聙 example_mindmap.json
          2. 盲驴庐忙聰鹿氓聠聟氓庐鹿氓聬聨盲驴聺氓颅聵
          3. 氓聫聦氓聡禄 mindmap_generator.exe
          4. 莽篓聥氓潞聫盲录職氓聹篓氓聬聦莽聸庐氓陆聲莽聰聼忙聢聬 example_mindmap.png 氓鹿露猫聡陋氓聤篓忙聣聯氓录聙
          "@ | Out-File -Encoding utf8 package\盲陆驴莽聰篓猫炉麓忙聵聨.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mindmap_generator_windows
          path: package
