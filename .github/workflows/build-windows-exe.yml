name: Build Windows EXE
on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/build-windows-exe.yml"
      - "mindmap_generator.py"
      - "example_mindmap.json"
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install pyinstaller pillow
      - run: pyinstaller --onefile --noconsole --name mindmap_generator mindmap_generator.py
      - shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package | Out-Null
          Copy-Item dist\mindmap_generator.exe package\
          Copy-Item example_mindmap.json package\
          "Edit example_mindmap.json, then double-click mindmap_generator.exe." | Out-File -Encoding utf8 package\README.txt
      - uses: actions/upload-artifact@v4
        with:
          name: mindmap_generator_windows
          path: package
